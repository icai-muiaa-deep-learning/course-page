name: Documentation
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Build Docs Documentation
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python & Install Dependencies
        uses: ./.github/actions/setup-env
        with:
          src-python-version: ${{ env.PYTHON_VERSION }}

      - name: Get Version
        id: version
        uses: ./.github/actions/obtain-version

      - name: Build Docs Site with Mike
        uses: ./.github/actions/build-docs
        with:
          docs-version: ${{ steps.version.outputs.version }}

